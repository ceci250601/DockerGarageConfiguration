<!-- =============================================================================
     calendar.html - Pagina configurazione calendario
     Mostra lista auto abilitate con opzioni:
       - Partenza a orario
       - Resta ferma
     Salvataggio → API /calendar/save
============================================================================= -->
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Configura Calendario</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
</head>
<body>
  <h1>Configura Calendario</h1>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <ul class="flash-list">
        {% for category, msg in messages %}
          <li class="flash {{ category }}">{{ msg }}</li>
        {% endfor %}
      </ul>
    {% endif %}
  {% endwith %}

  <div class="car-schedule-list">
    {% for car in cars %}
    <div class="calendar-form card" data-car="{{ car['model'] }}">
      <h2 class="subtitle">Impostazione per: {{ car['model'] }}</h2>

      <div class="form-row">
        <label>Modalità</label>
        <div class="chk-chips">
          <label class="chip">
            <input type="checkbox" class="mode depart">
            Imposta ora di partenza
          </label>
          <label class="chip">
            <input type="checkbox" class="mode idle">
            Resta ferma
          </label>
        </div>
      </div>

      <div class="form-row time-row">
        <label>Ora di partenza</label>
        <input type="time" class="time-input">
      </div>
    </div>
    {% endfor %}
  </div>

  <div style="text-align:center; margin-top:20px;">
    <!-- Importante: id coerente con script.js -->
    <button type="button" id="saveCalendarBtn">Salva configurazione</button>
  </div>

  <p style="text-align:center;">
    <a href="/">← Torna alla home</a>
  </p>
</body>
</html>
