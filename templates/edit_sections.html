<!-- =============================================================================
     edit_sections.html - Pagina per modificare il numero di sezioni del garage
============================================================================= -->
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Modifica Sezioni</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
</head>
<body>
  <h1>Modifica numero sezioni del garage</h1>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <ul class="flash-list">
        {% for category, msg in messages %}
          <li class="flash {{ category }}">{{ msg }}</li>
        {% endfor %}
      </ul>
    {% endif %}
  {% endwith %}

  <form method="post" class="car-form card">
    <div class="form-row">
      <label>Numero attuale: {{ current }}</label>
    </div>
    <div class="form-row">
      <label for="num_sections">Nuovo valore</label>
      <input id="num_sections" name="num_sections" type="number" value="{{ current }}">
    </div>
    <div class="form-actions">
      <button type="submit">Salva</button>
    </div>
  </form>

  <p><a href="{{ url_for('index') }}">← Torna alla home</a></p>
</body>
</html>
